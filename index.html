<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promo copy formatter</title>
    <link rel="icon" type="image/x-icon" href="image/favicon.ico">
    <!-- Fonts
          ================================================== -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Wix+Madefor+Display:wght@400..800&display=swap" rel="stylesheet">
    <!-- CSS
      ================================================== -->
    <link href="css/style.css" rel="stylesheet" type="text/css" />
    <link href="css/mediaqueries.css" rel="stylesheet" type="text/css" />

    <!-- JS
          ================================================== -->
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
    <script src="https://unpkg.com/prettier@3.0.3/standalone.js"></script>
    <script src="https://unpkg.com/prettier@3.0.3/plugins/html.js"></script>
</head>
<body>
<div class="main-wrapper">
    <div class="limit">
        <div class="primary-text-editor-wrapper">
            <h2 class="main-headline">ВЕРСІЯ ДЛЯ УНІКАЛЬНИХ КОПІЙ!</h2>
            <h2 class="main-headline">Редактор тексту:</h2>
            <div class="primary-text-editor-bg">
                <div class="primary-text-editor-block" id="editor" contenteditable="true">
                </div>
            </div>
        </div>
        <div class="code-blocks-wrapper">
            <div class="code-block">
                <div class="code-buttons-wrapper">
                    <button class="primary-button" id="downloadBtn" onclick="exportHTML()">Завантажити HTML</button>
                    <!-- Поле для введення номера файлу -->
                    <div class="input-number-block">

                        <!-- Name update -->
                        <label class="input-number-label" for="fileName">Введіть номер<br> файлу:</label>
                        <div class="input-number-wrapper">
                        <!--<input class="input-number" type="number" id="fileNumber" value="" min="1">-->
                            <button class="button-decrement" onclick="changeNumber(-1)">&#11015;</button>
                            <input class="input-number input-name" type="text" id="fileName" value="" autocomplete="off">
                            <button class="button-increment" onclick="changeNumber(1)">&#11014;</button>
                        </div>
                        <!-- Name update end -->

                    </div>
                </div>
                <div class="code-inner-block">
                    <h2 class="main-headline">HTML результат:</h2>
                    <textarea class="html-code-block" id="output" contenteditable="true"></textarea>
                </div>
            </div>
         <!--   <div class="code-block">
                <div class="code-buttons-wrapper">
                    <button class="primary-button" onclick="exportMJML()">Експортувати MJML</button>
                    <button class="primary-button" id="mjmlDownloadBtn">Завантажити MJML</button>
                    &lt;!&ndash; Поле для введення номера файлу &ndash;&gt;
                    <div class="input-number-block">
                        <label class="input-number-label" for="mjmlFileNumber">Введіть номер<br> файлу:</label>
                        <input class="input-number" type="number" id="mjmlFileNumber" value="" min="1">
                    </div>
                </div>
                <div class="code-inner-block">
                    <h2 class="main-headline">MJML результат:</h2>
                    <textarea class="html-code-block" id="mjmlOutput" contenteditable="true"></textarea>
                </div>
            </div>-->

        </div>
        <div class="log-wrapper">
            <h3 class="sm-main-headline">Лог</h3>
            <div id="log" class="log"></div>
        </div>
    </div>

</div>





<script src="js/main.js"></script>

</body>
</html>
